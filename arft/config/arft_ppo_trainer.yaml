# AgentRFT PPO Trainer 配置
# 继承 verl 的 ppo_trainer.yaml，只覆盖需要修改的部分

defaults:
  # 继承 verl 的完整 ppo_trainer 配置
  - ppo_trainer

  # 覆盖 rollout 配置（使用 arft 的 AgentFlowConfig）
  - /overrides/rollout@actor_rollout_ref.rollout

  # _self_ 确保当前文件的配置优先
  - _self_

# 如果还需要覆盖其他配置，可以直接在这里添加
# 例如：
# actor_rollout_ref:
#   rollout:
#     agent:
#       num_workers: 16

