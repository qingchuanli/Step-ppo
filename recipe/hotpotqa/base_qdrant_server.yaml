# HotpotQA agent with Qdrant HTTP (same defaults as test_search.py).
# Override qdrant_url here if your Qdrant host differs.
- name: hotpotqa_agent
  _target_: recipe.hotpotqa.hotpotqa_agent_flow.HotpotQAAgentFlow
  max_steps: 5
  max_parallel_calls: 4
  force_first_search: true
  require_http_qdrant: true
  max_concurrent_searches: 2
  qdrant_request_timeout_s: 10.0
  qdrant_max_retries: 3
  qdrant_retry_backoff_s: 0.2

  qdrant_url: http://172.17.0.1:6333
  qdrant_path: null
  collection_name: hpqa_corpus
  embedding_model_name: BAAI/bge-large-en-v1.5